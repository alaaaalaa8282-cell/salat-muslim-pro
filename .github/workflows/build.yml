name: Build & Release APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Signed APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Validate gradle-wrapper.jar
        run: |
          JAR="gradle/wrapper/gradle-wrapper.jar"
          SIZE=$(stat -c%s "$JAR" 2>/dev/null || echo 0)
          if [ ! -f "$JAR" ] || [ "$SIZE" -lt 50000 ]; then
            curl -s "https://get.sdkman.io" | bash
            source "$HOME/.sdkman/bin/sdkman-init.sh"
            sdk install gradle 8.7
            gradle wrapper --gradle-version 8.7 --distribution-type bin
          fi

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks

      - name: Build Release APK
        run: |
          ./gradlew assembleRelease \
            -PSTORE_FILE=keystore.jks \
            -PSTORE_PASSWORD="${{ secrets.STORE_PASSWORD }}" \
            -PKEY_ALIAS="${{ secrets.KEY_ALIAS }}" \
            -PKEY_PASSWORD="${{ secrets.KEY_PASSWORD }}" \
            --no-daemon \
            --stacktrace

      - name: Get APK path
        id: apk
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "path=$APK" >> $GITHUB_OUTPUT

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: salat-muslim-pro
          path: ${{ steps.apk.outputs.path }}
          retention-days: 30

      - name: Get version name
        id: version
        run: |
          VERSION=$(grep versionName app/build.gradle.kts | grep -o '"[^"]*"' | tr -d '"')
          echo "name=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.name }}-${{ github.run_number }}
          name: "النسخة ${{ steps.version.outputs.name }} (#${{ github.run_number }})"
          body: |
            🕌 تطبيق صلات مسلم برو
            🤲 إهداء إلى روح محمد عبد العظيم الطويل رحمه الله
          files: ${{ steps.apk.outputs.path }}
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
