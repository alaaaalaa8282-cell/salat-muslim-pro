name: Build & Release APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Signed APK
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Validate gradle-wrapper.jar
        run: |
          JAR="gradle/wrapper/gradle-wrapper.jar"
          SIZE=$(stat -c%s "$JAR" 2>/dev/null || echo 0)
          if [ ! -f "$JAR" ] || [ "$SIZE" -lt 50000 ]; then
            curl -s "https://get.sdkman.io" | bash
            source "$HOME/.sdkman/bin/sdkman-init.sh"
            sdk install gradle 8.7
            gradle wrapper --gradle-version 8.7 --distribution-type bin
          fi

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Validate secrets exist
        run: |
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "❌ KEYSTORE_BASE64 is missing!" && exit 1
          fi
          if [ -z "${{ secrets.STORE_PASSWORD }}" ]; then
            echo "❌ STORE_PASSWORD is missing!" && exit 1
          fi
          if [ -z "${{ secrets.KEY_ALIAS }}" ]; then
            echo "❌ KEY_ALIAS is missing!" && exit 1
          fi
          if [ -z "${{ secrets.KEY_PASSWORD }}" ]; then
            echo "❌ KEY_PASSWORD is missing!" && exit 1
          fi
          echo "✅ All secrets present"

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $GITHUB_WORKSPACE/keystore.jks
          SIZE=$(stat -c%s $GITHUB_WORKSPACE/keystore.jks)
          echo "✅ Keystore size: $SIZE bytes"
          if [ "$SIZE" -lt 100 ]; then
            echo "❌ Keystore too small — base64 decode failed!" && exit 1
          fi

      - name: Build Signed Release APK
        env:
          STORE_FILE: ${{ github.workspace }}/keystore.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            --no-daemon \
            --stacktrace

      - name: Verify APK is signed
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "APK: $APK"
          OUTPUT=$($JAVA_HOME/bin/jarsigner -verify -verbose "$APK" 2>&1)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "jar is unsigned"; then
            echo "❌ APK غير موقّع!" && exit 1
          fi
          echo "✅ APK موقّع بنجاح"
          echo "apk_path=$APK" >> $GITHUB_ENV

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: salat-muslim-pro-signed
          path: ${{ env.apk_path }}
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "النسخة 1.0.${{ github.run_number }}"
          body: |
            🕌 تطبيق صلات مسلم برو — نسخة موقّعة
            🤲 إهداء إلى روح محمد عبد العظيم الطويل رحمه الله
          files: ${{ env.apk_path }}
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
